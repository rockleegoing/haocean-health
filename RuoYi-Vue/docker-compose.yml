version: '3.8'

services:
  ruoyi-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruoyi-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 文件上传目录映射
      - /tmp/ruoyi/uploadPath:/tmp/ruoyi/uploadPath
      # 日志目录映射
      - /tmp/ruoyi/logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
